name: Lint and Format

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-format:
    name: ESLint & Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run both checks independently so we get feedback from each even if one fails.
      - name: Run ESLint
        id: eslint
        run: npm run lint
        continue-on-error: true

      - name: Run Prettier check
        id: prettier
        run: npm run format:check
        continue-on-error: true

      # Emit annotations and fail the job if either check found issues.
      - name: Report results
        if: always()
        run: |
          FAILED=false

          if [ "${{ steps.eslint.outcome }}" == "failure" ]; then
            echo "::error::ESLint found issues. Run 'npm run lint:fix' locally to auto-fix them, then commit the changes."
            FAILED=true
          fi

          if [ "${{ steps.prettier.outcome }}" == "failure" ]; then
            echo "::error::Prettier found formatting issues. Run 'npm run format' locally to fix them, then commit the changes."
            FAILED=true
          fi

          if [ "$FAILED" == "true" ]; then
            exit 1
          fi
