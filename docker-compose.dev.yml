services:
  # Neon Local proxy — creates an ephemeral Neon branch on start,
  # deletes it on stop. Requires NEON_API_KEY, NEON_PROJECT_ID (and
  # optionally PARENT_BRANCH_ID) to be set in .env.development.
  db:
    image: neondatabase/neon_local:latest
    ports:
      - '5432:5432'
    env_file:
      - .env.development
  app:
    build:
      context: .
      target: development
    env_file: .env.development
    ports:
      - '3000:3000'
    # Mount src for hot reload without rebuilding the image.
    volumes:
      - ./src:/app/src
    depends_on:
      - db
    restart: unless-stopped
